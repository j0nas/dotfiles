packages:
  darwin:
    brews:
      - age   # decrypts chezmoi-managed secrets via SSH key
      - llmfit  # picks the right local LLM + quant for this machine's hardware
      - uv    # uvx launches the Fusion360 MCP server on demand
    casks:
      - nikitabobko/tap/aerospace
      - bambu-studio
      - brave-browser
      - calibre  # TEMP: remove once Tora's Kindle (PW1) rescue is done
      - discord
      - epson-print-layout
      - font-jetbrains-mono-nerd-font
      - lm-studio
      - obsidian
      - signal
      - spotify
      - swiftbar  # menu-bar host for the ad-hoc AeroSpace workspace-label indicator
      - visual-studio-code
      - wezterm
      - xtool-studio  # xTool Studio (formerly Creative Space) — design/control for the xTool P2 laser
  windows:
    winget:
      - Apple.iCloud
      - Bambulab.Bambustudio
      - Brave.Brave
      - DEVCOM.JetBrainsMonoNerdFont
      - Discord.Discord
      - Microsoft.VisualStudioCode
      - Obsidian.Obsidian
      - OpenWhisperSystems.Signal
      - Spotify.Spotify
      - wez.wezterm
  linux:
    flatpaks:
      - com.bambulab.BambuStudio
      - com.brave.Browser
      - com.discordapp.Discord
      - com.spotify.Client
      - com.visualstudio.code
      - md.obsidian.Obsidian
      - org.signal.Signal
vscode_extensions:
  - anthropic.claude-code
  - bradlc.vscode-tailwindcss
  - buenon.scratchpads
  - catppuccin.catppuccin-vsc
  # Vite+ IDE integration (viteplus.dev/guide/ide-integration). The Vite+ pack
  # bundles oxc (format/lint via `vp check`) + vitest (`vp test`); all three are
  # listed explicitly so the strict-declarative prune in install-vscode-extensions
  # doesn't uninstall the bundled members as "undeclared" on the next apply.
  - oxc.oxc-vscode
  - vitest.explorer
  - voidzero.vite-plus-extension-pack
