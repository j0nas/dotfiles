# Default Node version for fnm (used by the bootstrap + the mise-tools converge
# script). Bump here to roll the global default across machines on next apply.
node_default: "26"

packages:
  darwin:
    brews:
      - age   # decrypts chezmoi-managed secrets via SSH key
      - llmfit  # picks the right local LLM + quant for this machine's hardware
      - uv    # uvx launches the Fusion360 MCP server on demand
    casks:
      - nikitabobko/tap/aerospace
      - bambu-studio
      - brave-browser
      - calibre  # TEMP: remove once Tora's Kindle (PW1) rescue is done
      - discord
      - epson-print-layout
      - font-jetbrains-mono-nerd-font
      - lm-studio
      - obsidian
      - signal
      - spotify
      - visual-studio-code
      - wezterm
  windows:
    winget:
      - Apple.iCloud
      - Bambulab.Bambustudio
      - Brave.Brave
      - DEVCOM.JetBrainsMonoNerdFont
      - Discord.Discord
      - Microsoft.VisualStudioCode
      - Obsidian.Obsidian
      - OpenWhisperSystems.Signal
      - Spotify.Spotify
      - wez.wezterm
  linux:
    flatpaks:
      - com.bambulab.BambuStudio
      - com.brave.Browser
      - com.discordapp.Discord
      - com.spotify.Client
      - com.visualstudio.code
      - md.obsidian.Obsidian
      - org.signal.Signal
vscode_extensions:
  - anthropic.claude-code
  - bradlc.vscode-tailwindcss
  - buenon.scratchpads
  - catppuccin.catppuccin-vsc
