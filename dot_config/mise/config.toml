[tools]
starship = "latest"
zoxide = "latest"
fzf = "latest"
gh = "latest"
jq = "latest"  # JSON parsing for shell scripts (e.g. the install-intercept Claude hook)
# taplo + check-jsonschema power the repo's pre-commit config validation hook
# (.githooks/pre-commit). taplo schema-checks TOML (starship, mise) and
# check-jsonschema schema-checks JSON (Claude settings, opencode) against the
# vendored schemas in .githooks/schemas/. jq above does JSON syntax checks.
taplo = "latest"
"pipx:check-jsonschema" = "latest"  # pipx backend; uv (brew) provides the venv
shellcheck = "latest"  # lints the repo's shell scripts in the pre-commit hook + CI
# Node itself is delegated to fnm (installed below) — the Node-native version
# manager auto-switches per .node-version/.nvmrc and allows on-the-fly `fnm use`.
"aqua:Schniz/fnm" = "latest"
# pnpm as a standalone tool. Corepack (the old way to provision pnpm) was
# removed from the Node distribution in v25+, and pnpm now self-manages its
# version from a project's package.json "packageManager" field (pmOnFail:
# download, the default). So this just needs to put *some* pnpm on PATH —
# pnpm then auto-switches to each project's pinned version. Version here is
# irrelevant for that reason; "latest" keeps the baseline current.
pnpm = "latest"
# ccusage: analyzes Claude Code token usage from local JSONL logs. npm-backed
# so it lands on PATH (vs `npx` re-downloading each run) — the Claude Code
# statusLine spawns `ccusage statusline` on every prompt render.
"npm:ccusage" = "latest"
# vite-plus (vp): the Vite+ unified web toolchain — Vite/Rolldown build, Oxc
# lint/format/typecheck, Vitest. npm-backed so the `vp` bin lands on PATH on
# every OS (the official npm dist pulls the native binaries via optional deps),
# replacing the earlier `curl https://vite.plus | bash` bootstrap step so the
# version is mise-managed rather than a network self-install. The `viteplus`
# rule (~/.claude/rules) assumes this is present — keep them in sync.
"npm:vite-plus" = "latest"
# opencode: open-source terminal AI coding agent (anomalyco/opencode, formerly
# sst/opencode). Registry short name resolves to the aqua-backed release binary.
opencode = "latest"
